<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prelim Grade Calculator</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
    }

    .card {
        background: #ffffff;
        width: 360px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3c72;
    }

    label {
        font-size: 14px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 6px 0 14px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1e3c72;
        color: white;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #16315d;
    }

    .output {
        margin-top: 18px;
        background: #f4f6f9;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        white-space: pre-line;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Prelim Grade Calculator</h2>

    <label>Attendance</label>
    <input id="attendance" type="number">

    <label>Lab Work 1</label>
    <input id="lab1" type="number">

    <label>Lab Work 2</label>
    <input id="lab2" type="number">

    <label>Lab Work 3</label>
    <input id="lab3" type="number">

    <button onclick="compute()">Compute</button>

    <div class="output" id="output"></div>
</div>

<script src="prelimGradeCalculator.js"></script>
</body>
</html>
